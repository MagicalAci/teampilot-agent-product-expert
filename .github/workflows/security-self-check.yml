name: Security Self-Check

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**

jobs:
  security-self-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run repository security self-check
        run: python scripts/security_self_check.py
