name: Auto Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'release:')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version bump
        id: bump
        run: |
          CURRENT=$(grep -A1 '^release:' .teampilot/agent.yml | grep 'version:' | head -1 | sed 's/.*version: *//' | tr -d "'\"")
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"

          LAST_TAG="v${CURRENT}"
          if ! git rev-parse "${LAST_TAG}" >/dev/null 2>&1; then
            LAST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          fi

          BUMP="none"
          if [ -n "${LAST_TAG}" ]; then
            COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline 2>/dev/null || true)
          else
            COMMITS=$(git log --oneline -20 2>/dev/null || true)
          fi

          if echo "${COMMITS}" | grep -qiE '^[0-9a-f]+ (feat|feature)(\(|:|\!)'; then
            BUMP="minor"
          elif echo "${COMMITS}" | grep -qiE '^[0-9a-f]+ (fix|perf|refactor)(\(|:)'; then
            BUMP="patch"
          fi

          echo "bump=${BUMP}" >> "$GITHUB_OUTPUT"

          if [ "${BUMP}" = "none" ]; then
            echo "No version bump needed"
            exit 0
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT}"
          if [ "${BUMP}" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          elif [ "${BUMP}" = "patch" ]; then
            PATCH=$((PATCH + 1))
          fi
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "new=${NEW}" >> "$GITHUB_OUTPUT"
          echo "Version: ${CURRENT} → ${NEW} (${BUMP})"

      - name: Generate release notes
        if: steps.bump.outputs.bump != 'none'
        id: notes
        run: |
          LAST_TAG="v${{ steps.bump.outputs.current }}"
          if ! git rev-parse "${LAST_TAG}" >/dev/null 2>&1; then
            LAST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          fi

          {
            echo 'body<<RELEASE_EOF'
            echo "## Changes"
            echo ""
            if [ -n "${LAST_TAG}" ]; then
              git log "${LAST_TAG}..HEAD" --pretty=format:"- %s" --no-merges | grep -v '^- release:' || true
            else
              git log --oneline -10 --pretty=format:"- %s" --no-merges | grep -v '^- release:' || true
            fi
            echo ""
            echo 'RELEASE_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Update version in agent.yml, README, and docs
        if: steps.bump.outputs.bump != 'none'
        run: |
          NEW="${{ steps.bump.outputs.new }}"
          OLD="${{ steps.bump.outputs.current }}"

          sed -i "s/^  version: .*/  version: ${NEW}/" .teampilot/agent.yml

          sed -i "s/^- Version：\`.*\`/- Version：\`${NEW}\`/" README.md

          # Update install instructions version in README
          sed -i "s|version=${OLD}|version=${NEW}|g" README.md
          sed -i "s|product-expert/${OLD}|product-expert/${NEW}|g" README.md

          # Update docs/index.html version references
          if [ -f docs/index.html ]; then
            sed -i "s|<span>v${OLD}</span>|<span>v${NEW}</span>|g" docs/index.html
            sed -i "s|<span class=\"tag\">v${OLD}</span>|<span class=\"tag\">v${NEW}</span>|g" docs/index.html
            sed -i "s|Agent v${OLD}|Agent v${NEW}|g" docs/index.html
            sed -i "s|version=${OLD}|version=${NEW}|g" docs/index.html
            sed -i "s|product-expert/${OLD}|product-expert/${NEW}|g" docs/index.html
            sed -i "s|版本：${OLD}|版本：${NEW}|g" docs/index.html
          fi

      - name: Commit, tag, and push
        if: steps.bump.outputs.bump != 'none'
        run: |
          NEW="${{ steps.bump.outputs.new }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .teampilot/agent.yml README.md docs/
          git commit -m "release: v${NEW}"
          git tag "v${NEW}"
          git push origin main --tags

      - name: Create GitHub Release
        if: steps.bump.outputs.bump != 'none'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.new }}" \
            --title "v${{ steps.bump.outputs.new }}" \
            --notes "${{ steps.notes.outputs.body }}"
