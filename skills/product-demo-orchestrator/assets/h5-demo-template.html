<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>[DEMO_TITLE] - H5 Demo</title>
    <style>
      :root {
        --bg: #0f172a;
        --surface: rgba(255, 255, 255, 0.08);
        --surface-strong: rgba(255, 255, 255, 0.16);
        --text: #f8fafc;
        --muted: rgba(248, 250, 252, 0.7);
        --primary: #38bdf8;
        --accent: #22c55e;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(56, 189, 248, 0.25), transparent 45%),
          linear-gradient(180deg, #020617 0%, var(--bg) 100%);
      }
      .phone {
        width: min(100%, 430px);
        margin: 0 auto;
        padding: 20px 16px 40px;
      }
      .card {
        background: var(--surface);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: 18px;
        backdrop-filter: blur(16px);
      }
      .badge {
        display: inline-flex;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(56, 189, 248, 0.16);
        color: var(--primary);
        font-size: 12px;
        font-weight: 700;
      }
      h1 { font-size: 34px; line-height: 1.1; margin: 14px 0 10px; }
      p { color: var(--muted); line-height: 1.65; }
      .stack {
        display: grid;
        gap: 12px;
        margin-top: 16px;
      }
      .tile {
        padding: 14px;
        border-radius: 18px;
        background: var(--surface-strong);
      }
      .cta {
        width: 100%;
        margin-top: 16px;
        border: 0;
        border-radius: 18px;
        background: linear-gradient(135deg, var(--primary), #60a5fa);
        color: #082f49;
        font-size: 16px;
        font-weight: 800;
        padding: 16px;
        cursor: pointer;
        transition: transform 180ms ease, opacity 180ms ease;
      }
      .cta:hover { transform: translateY(-2px); }
      .bottom {
        margin-top: 18px;
        display: grid;
        gap: 12px;
      }
      @media (prefers-reduced-motion: reduce) {
        .cta { transition: none; }
      }
    </style>
  </head>
  <body>
    <main class="phone">
      <section class="card">
        <span class="badge">[DEMO_STACK_LABEL]</span>
        <h1>[DEMO_TITLE]</h1>
        <p>这是一个移动端 H5 demo 骨架。建议首屏只保留最重要的一句价值说明、一个主 CTA 和两到三个核心状态块。</p>

        <div class="stack">
          <article class="tile">
            <strong>主路径</strong>
            <p>这里放“用户一进来做什么”的第一步。</p>
          </article>
          <article class="tile">
            <strong>关键状态</strong>
            <p>这里放最能体现价值的中间结果或数据回馈。</p>
          </article>
          <article class="tile">
            <strong>完成动作</strong>
            <p>这里放最后的成交、提交或分享动作。</p>
          </article>
        </div>

        <button class="cta">开始演示</button>
      </section>

      <section class="bottom">
        <article class="card">
          <strong>演示建议</strong>
          <p>录屏时优先展示一条完整路径，不要在首版 demo 中堆叠过多分支。</p>
        </article>
        <article class="card">
          <strong>当前限制</strong>
          <p>默认使用静态数据与占位文案，后续接真实接口时请同步更新 walkthrough。</p>
        </article>
      </section>
    </main>
  </body>
</html>
