version: 1
agent:
  slug: product-expert
  name: 产品专家 Agent
  description: 内置调研分析（单产品/方向/全景/用户研究）、产品策划、AI策划、Demo开发、SQL数据查询分析五项完整能力的 Cursor 原生 Agent。
  repoFullName: MagicalAci/teampilot-agent-product-expert
  cursorOnly: true
  standaloneEnabled: true
release:
  version: 0.14.3
  notes: 新增 /Demo上线 部署能力 — 支持将 Web/H5 demo 一键部署到 Vercel、Surge、Netlify、Cloudflare Pages，获取可分享在线链接。
dependencies:
  skills:
    - skills/research-toolkit/SKILL.md
    - skills/education-prd-orchestrator/SKILL.md
    - skills/ai-planning-orchestrator/SKILL.md
    - skills/product-demo-orchestrator/SKILL.md
    - skills/aibi-query/SKILL.md
  mcps:
    - user-firecrawl
    - user-app-insight
    - user-xiaohongshu
    - user-weibo
    - user-bilibili
    - user-antv-chart
  templates: []
  policies:
    - policies/submission-review-contract.md
contracts:
  submitChecklist:
    - 交付物必须明确对应本次能力入口，并落在该能力约定的标准目录结构中。
    - 单产品分析需保留任务卡、关键证据、过程记录、最终判断与事实核查痕迹。
    - 产品策划需保留 PRD、图文资产、证据包与 review 交接信息。
    - AI策划需保留 AI PRD、脚本或样例、测试报告，以及必要的开发 README 或打包清单。
    - Demo开发需保留 demo brief、design system、平台入口文件、preflight checklist、walkthrough 与 developer handoff。若已部署上线，需保留 deploy-result.md 记录在线 URL。
    - 若 Agent 给出多个备选方案，最终选择与理由必须由人类明确确认。
  reviewChecklist:
    - 确认交付物是否覆盖任务目标、关键要求与约束条件。
    - 确认能力对应的标准文件结构、脚本校验或 smoke test 是否通过。
    - 确认证据、判断、风险与剩余待确认事项是否已分层表达。
    - 确认需要沉淀到 Agent 的经验是否已通过 `/更新请求` 或 `/经验写回` 提出。
  updateRequestGuidance: 更新请求应说明当前问题、建议调整、适用场景，以及希望写回到 Agent 仓库的技能、脚本、模板或规则位置。
cursor:
  quickstartTitle: 产品专家 Agent 快速上手
  commands:
    - key: deep-research
      title: 深度调研
      command: /深度调研
      description: 调研分析主入口，AI 自动识别任务类型（单产品/方向/全景/用户研究），走完整流程
      example: /深度调研 Kimi学习版
    - key: overseas-research
      title: 海外调研
      command: /海外调研
      description: 海外通道快捷入口，用 last30days 引擎对 Reddit/X/YouTube/HN/TikTok/Polymarket 等海外平台采集并归一
      example: /海外调研 Perplexity
    - key: crawl
      title: 爬取
      command: /爬取
      description: 调用 MediaCrawler/XHS-Downloader 进行关键词搜索与评论采集
      example: /爬取 xhs AI学习工具,AI教育
    - key: guided-experience
      title: 体验引导
      command: /体验引导
      description: 引导用户完成 App/Web 实测体验并录入素材
      example: /体验引导
    - key: research-install
      title: 调研安装
      command: /调研安装
      description: 安装 DeerFlow + MediaCrawler + XHS-Downloader 工具链
      example: /调研安装
    - key: research-doctor
      title: 调研体检
      command: /调研体检
      description: 环境 + MCP + API + 工具链全面就绪检查
      example: /调研体检
    - key: research-auth
      title: 调研授权
      command: /调研授权
      description: 小红书 QR 二维码授权流程
      example: /调研授权
    - key: research-package
      title: 调研打包
      command: /调研打包
      description: 构建可分发的 Skill zip 包
      example: /调研打包
    - key: product-planning
      title: 产品策划
      command: /产品策划
      description: 启动产品 PRD、流程、图文与校验工作流
      example: /产品策划 家长端留存提升方案
    - key: product-planning-validate
      title: 产品策划校验
      command: /产品策划校验
      description: 校验已有产品策划文档、图文资产与证据链
      example: /产品策划校验 outputs/demo/prd.md
    - key: ai-planning
      title: AI策划
      command: /AI策划
      description: 启动 AI PRD、脚本、测试全流程
      example: /AI策划 PRD 生成 Agent
    - key: ai-prd
      title: AIPRD
      command: /AIPRD
      description: 单独撰写或刷新 AI PRD
      example: /AIPRD PRD 生成 Agent
    - key: ai-script
      title: AI脚本
      command: /AI脚本
      description: 单独开发 AI 脚本、样例和 README
      example: /AI脚本 PRD 生成 Agent
    - key: ai-test
      title: AI测试
      command: /AI测试
      description: 单独验证 AI 脚本并输出测试报告
      example: /AI测试 PRD 生成 Agent
    - key: demo-development
      title: Demo开发
      command: /Demo开发
      description: 启动产品 demo 的全流程，覆盖 brief、设计系统、脚手架、打磨与校验
      example: /Demo开发 AI 陪练产品首页 demo，目标平台：H5
    - key: demo-design-system
      title: Demo设计系统
      command: /Demo设计系统
      description: 单独产出或刷新 demo 的设计系统
      example: /Demo设计系统 AI 陪练产品首页 demo
    - key: demo-scaffold
      title: Demo脚手架
      command: /Demo脚手架
      description: 初始化 Web、H5 或 SwiftUI demo 骨架
      example: /Demo脚手架 AI 陪练产品首页 demo，目标平台：Web
    - key: demo-polish
      title: Demo打磨
      command: /Demo打磨
      description: 在已有 demo 骨架上补齐 baseline、a11y、metadata 与动效性能
      example: /Demo打磨 outputs/demo-home
    - key: demo-validate
      title: Demo校验
      command: /Demo校验
      description: 校验 demo brief、design system、入口文件与交接文档
      example: /Demo校验 outputs/demo-home
    - key: demo-deploy
      title: Demo上线
      command: /Demo上线
      description: 将已完成的 Web/H5 demo 部署到云端（Vercel/Surge/Netlify/Cloudflare），获取可分享链接
      example: /Demo上线 outputs/demo-home
    - key: sql-query
      title: SQL查询
      command: /SQL
      description: 快速版 — 自然语言查询数据库，聊天内直接输出结论+表格+图表，不写文件
      example: /SQL 帮我看下星卡最近的用户和订单情况
    - key: sql-deep
      title: SQL深度分析
      command: /SQL深度
      description: 深度版 — 自然语言查询数据库，生成 HTML 看板 + CSV 数据表 + 完整洞察分析
      example: /SQL深度 帮我出一份绘本产品的完整运营分析报告
    - key: capabilities
      title: 查看能力
      command: /查看能力
      description: 列出五个核心能力点和子命令
      example: /查看能力
    - key: check-update
      title: 检查Agent更新
      command: /检查Agent更新
      description: 查看当前版本与后续更新提示
      example: /检查Agent更新
    - key: update-request
      title: 更新请求
      command: /更新请求
      description: 整理需要回写到 Agent 仓库的方法、模板或脚本改动
      example: /更新请求 把这次图文校验流程固化到产品策划能力里
    - key: writeback
      title: 经验写回
      command: /经验写回
      description: 把本次可沉淀的方法、提示词或判断框架写回为 Agent 仓库 PR
      example: /经验写回 把这次竞品拆解模板沉淀到单产品分析能力里
capabilities:
  - key: research-toolkit
    title: 调研分析
    description: 统一调研分析能力 — 支持单产品深度分析、方向调研、市场全景、用户研究，含国内/海外双采集通道（国内 DeerFlow + MediaCrawler 社媒，海外 last30days 覆盖 Reddit/X/YouTube/HN/TikTok/Polymarket），自带质量门禁、逐章写作与三轮事实核查。
    command: /深度调研
    recommendedWhen: 当你需要深入分析产品、验证方向可行性、对比竞品、挖掘用户痛点，或调研海外/出海产品舆情时使用。
    inputTemplate: /深度调研 Kimi学习版
    outputFormat: 任务卡、国内平台 summary/data、海外通道 overseas summary/data、DeerFlow 深度报告、体验报告、章节成稿、事实核查与最终报告
    skillRefs:
      - skills/research-toolkit/SKILL.md
    mcpRefs:
      - user-firecrawl
      - user-app-insight
      - user-xiaohongshu
      - user-weibo
      - user-bilibili
    templateRefs: []
    policyRefs:
      - policies/submission-review-contract.md
  - key: product-planning
    title: 产品策划
    description: 证据驱动的产品策划与 PRD 交付能力，覆盖任务卡冻结、定义闸门、章节编排、配图与校验。
    command: /产品策划
    recommendedWhen: 当你需要从 0 到 1 写 PRD，或校验已有产品文档、图文资产与证据链时使用。
    inputTemplate: /产品策划 家长端留存提升方案
    outputFormat: portable outputs 目录、prd.md、images、html、charts、evidence、review
    skillRefs:
      - skills/education-prd-orchestrator/SKILL.md
    mcpRefs: []
    templateRefs: []
    policyRefs:
      - policies/submission-review-contract.md
  - key: ai-planning
    title: AI策划
    description: 面向 AI 方案落地的产品能力，覆盖 AI PRD、脚本开发、测试报告与最小交接包。
    command: /AI策划
    recommendedWhen: 当方案核心依赖 LLM、Prompt、工具调用、结构化输出或 Agent 工作流时使用。
    inputTemplate: /AI策划 PRD 生成 Agent
    outputFormat: AI PRD、脚本与样例、测试报告、开发 README、脚本包清单
    skillRefs:
      - skills/ai-planning-orchestrator/SKILL.md
    mcpRefs: []
    templateRefs: []
    policyRefs:
      - policies/submission-review-contract.md
  - key: demo-development
    title: Demo开发
    description: 面向 Web、H5 与 SwiftUI 的产品 demo 开发能力，覆盖 brief、设计系统、脚手架、打磨、校验、交接与一键部署上线。
    command: /Demo开发
    recommendedWhen: 当你要快速做一个可演示、可讲述、可交接的产品 demo，而不是完整正式工程时使用。
    inputTemplate: /Demo开发 AI 陪练产品首页 demo，目标平台：H5，输出：可演示页面 + design system + walkthrough + handoff。
    outputFormat: outputs 目录、design system、平台入口文件、preflight checklist、walkthrough、handoff、zip 包、部署 URL
    skillRefs:
      - skills/product-demo-orchestrator/SKILL.md
    mcpRefs: []
    templateRefs: []
    policyRefs:
      - policies/submission-review-contract.md
  - key: sql-query
    title: SQL数据查询
    description: 星火工坊 AIBI 数据查询分析能力，自然语言提问自动生成 SQL 查询 DBOPS 数据库，输出分析报告。支持快速版（纯聊天输出）和深度版（HTML看板+CSV）。覆盖 sparklab_starcard、sparklab_picbook、sg_sparklab_poptoy 三个线上库。
    command: /SQL
    recommendedWhen: 当你需要查看业务数据、分析运营指标、跑 SQL 查询、生成数据看板时使用。
    inputTemplate: /SQL 帮我看下绘本产品最近的用户和阅读情况
    outputFormat: 结论洞察（3-5 条）、数据表格（纵排/横排 Markdown 或 CSV）、图表（AntV MCP）、可选 HTML 看板
    skillRefs:
      - skills/aibi-query/SKILL.md
    mcpRefs:
      - user-antv-chart
    templateRefs: []
    policyRefs:
      - policies/submission-review-contract.md
workflows:
  listCapabilitiesCommand: /查看能力
  checkUpdateCommand: /检查Agent更新
  submitCommand: /提交产出
  reviewCommand: /评审结果
  updateCommand: /更新请求
